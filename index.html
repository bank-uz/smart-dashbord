<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investitsiya 2026: Strategik Dashbord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; padding: 24px; transition: transform 0.2s; }
        .glass-card:hover { transform: translateY(-2px); }
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .tab-btn.active { color: #2563eb; background: #eff6ff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #2563eb; border-radius: 3px; }
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; border: 1px solid currentColor; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="bg-white p-10 rounded-2xl shadow-2xl max-w-sm w-full">
            <div class="mb-6 text-center">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-800">Tizimga kirish</h2>
                <p class="text-slate-500 mt-2 text-sm">"dastur2026" tahliliy tizimi</p>
            </div>
            <input type="password" id="password" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none mb-4 transition-all" placeholder="Parol (hudud30)" onkeypress="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all">Ma'lumotlarni yuklash</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 hidden text-center">❌ Xato parol! Qayta urinib ko'ring.</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-content" class="max-w-7xl mx-auto hidden opacity-0 transition-opacity duration-700">
        
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="status-badge text-blue-600 bg-blue-50">2026 Strategik Reja</span>
                    <span id="update-time" class="text-xs text-slate-400 font-medium"></span>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Investitsiya Dashbordi</h1>
                <p class="text-slate-500 text-lg mt-1 font-medium">Monitoring va ehtimoliy xatarlar tahlili</p>
            </div>
            <div id="status-box" class="flex items-center gap-3 bg-white p-2 pr-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.58 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.58 4 8 4s8-1.79 8-4M4 7c0-2.21 3.58-4 8-4s8 1.79 8 4m0 5c0 2.21-3.58 4-8 4s-8-1.79-8-4"/></svg>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold text-slate-400 leading-none">Baza holati</p>
                    <p id="status-text" class="text-sm font-bold text-slate-700">Yuklanmoqda...</p>
                </div>
            </div>
        </header>

        <!-- NAVIGATION TABS -->
        <div id="tabs-container" class="flex gap-1 mb-8 overflow-x-auto pb-2 scrollbar-hide border-b border-slate-200">
            <!-- Tabs will be injected here -->
        </div>

        <div id="main-view">
            <!-- KPI GRID -->
            <div id="kpi-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"></div>
            
            <!-- CHARTS GRID -->
            <div id="charts-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10"></div>

            <!-- SMART ANALYSIS BLOCK -->
            <div class="glass-card bg-slate-900 border-none relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-10 pointer-events-none">
                    <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.464 15.05a1 1 0 010 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707zM19.121 19.121a1 1 0 01-1.414 0l-4.243-4.243a1 1 0 011.414-1.414l4.243 4.243a1 1 0 010 1.414z"/></svg>
                </div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-2 h-8 bg-amber-400 rounded-full"></div>
                        <h2 class="text-xl font-bold text-white uppercase tracking-wider">Tahliliy xulosa va tavsiyalar</h2>
                    </div>
                    <div id="analysis-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- AI Analysis injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1UT8kIRpmQYdhbYC5mREZGqroPWlw4ICrWa_UCOjsvoA'; // O'zgartirishni unutmang
        const SHEET_NAMES = ['hudud', 'tarmoqlar'];
        let globalData = {};
        let chartInstances = [];

        function checkPassword() {
            if(document.getElementById('password').value === 'hudud30') {
                document.getElementById('login-screen').classList.add('hidden');
                const content = document.getElementById('dashboard-content');
                content.classList.remove('hidden');
                setTimeout(() => content.style.opacity = '1', 100);
                document.getElementById('update-time').innerText = "Yangilangan: " + new Date().toLocaleString('uz-UZ');
                loadData();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        async function loadData() {
            const tabsContainer = document.getElementById('tabs-container');
            let first = true;

            for(const name of SHEET_NAMES) {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
                const response = await fetch(url);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        globalData[name] = results.data;
                        
                        const btn = document.createElement('button');
                        btn.className = `tab-btn px-8 py-4 text-sm font-bold uppercase tracking-widest whitespace-nowrap ${first ? 'active' : 'text-slate-400 hover:text-slate-600'}`;
                        btn.innerText = name === 'hudud' ? '📍 Hududlar kesimi' : '🏗 Tarmoqlar tahlili';
                        btn.onclick = (e) => {
                            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-slate-900'));
                            btn.classList.add('active');
                            renderView(name);
                        };
                        tabsContainer.appendChild(btn);

                        if(first) { renderView(name); first = false; }
                        document.getElementById('status-text').innerText = "Ma'lumotlar faol";
                    }
                });
            }
        }

        function renderView(sheetName) {
            const data = globalData[sheetName];
            const kpiGrid = document.getElementById('kpi-grid');
            const chartsGrid = document.getElementById('charts-grid');
            const analysisGrid = document.getElementById('analysis-content');
            
            // Clear previous
            kpiGrid.innerHTML = ''; chartsGrid.innerHTML = ''; analysisGrid.innerHTML = '';
            chartInstances.forEach(c => c.destroy());
            chartInstances = [];

            const labelKey = Object.keys(data[0])[0];
            const numKeys = Object.keys(data[0]).filter(k => typeof data[0][k] === 'number');

            // 1. KPI Cards
            const topKPIs = numKeys.slice(0, 4);
            topKPIs.forEach((key, i) => {
                const total = data.reduce((sum, row) => sum + (row[key] || 0), 0);
                const colorClass = key.toLowerCase().includes('npl') || key.toLowerCase().includes('muammo') ? 'text-red-600' : 'text-blue-600';
                kpiGrid.innerHTML += `
                    <div class="glass-card border-b-4 ${i%2===0 ? 'border-blue-500' : 'border-indigo-500'}">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-tighter">${key.replace(/_/g, ' ')}</p>
                        <p class="text-2xl font-black text-slate-800">${total.toLocaleString('uz-UZ')}</p>
                    </div>
                `;
            });

            // 2. Charts
            createChartBlock(chartsGrid, 'bar', 'Asosiy ko\'rsatkichlar reytingi', data, labelKey, numKeys.slice(0, 2));
            createChartBlock(chartsGrid, 'line', 'Xatarlar dinamikasi (NPL va Muammolar)', data, labelKey, numKeys.filter(k => k.toLowerCase().includes('npl') || k.toLowerCase().includes('muammo')));

            // 3. Smart Analysis
            numKeys.slice(0, 6).forEach(key => {
                const sorted = [...data].sort((a, b) => (b[key]||0) - (a[key]||0));
                const top = sorted[0];
                const isNegative = key.toLowerCase().includes('npl') || key.toLowerCase().includes('muammo') || key.toLowerCase().includes('ishga_tushirilmagan');
                
                analysisGrid.innerHTML += `
                    <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 rounded-full ${isNegative ? 'bg-red-500 animate-pulse' : 'bg-emerald-500'}"></span>
                            <h4 class="text-slate-300 font-bold text-xs uppercase">${key.replace(/_/g, ' ')}</h4>
                        </div>
                        <p class="text-white text-sm">
                            Eng yuqori ko'rsatkich: <span class="font-bold text-amber-400">${top[labelKey]}</span> 
                            (${top[key].toLocaleString('uz-UZ')}). 
                            ${isNegative ? 'Ushbu yo\'nalish bo\'yicha zudlik bilan nazorat o\'rnatish va sabablarni o\'rganish talab etiladi.' : 'Ushbu ko\'rsatkich bo\'yicha o\'sish tendentsiyasi ijobiy baholanadi.'}
                        </p>
                    </div>
                `;
            });
        }

        function createChartBlock(parent, type, title, data, labelKey, keys) {
            const id = 'chart-' + Math.random().toString(36).substr(2, 9);
            const container = document.createElement('div');
            container.className = 'glass-card';
            container.innerHTML = `<h3 class="text-sm font-black text-slate-700 uppercase mb-6 tracking-wide border-b pb-4">${title}</h3><div class="h-72"><canvas id="${id}"></canvas></div>`;
            parent.appendChild(container);

            const ctx = document.getElementById(id).getContext('2d');
            const newChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: data.map(r => r[labelKey]),
                    datasets: keys.map((k, i) => ({
                        label: k.replace(/_/g, ' '),
                        data: data.map(r => r[k]),
                        backgroundColor: i === 0 ? 'rgba(37, 99, 235, 0.8)' : 'rgba(99, 102, 241, 0.8)',
                        borderColor: i === 0 ? '#2563eb' : '#6366f1',
                        borderWidth: 2,
                        borderRadius: 5
                    }))
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { weight: '600', size: 10 } } } } }
            });
            chartInstances.push(newChart);
        }
    </script>
</body>
</html>
